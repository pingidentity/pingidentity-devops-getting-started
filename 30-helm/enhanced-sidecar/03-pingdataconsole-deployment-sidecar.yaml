# Deployment example showing the minimal utility sidecar configuration.
# The chart will auto-create `temp` and `out-dir` emptyDir volumes when needed.

global:
  envs:
    PING_IDENTITY_ACCEPT_EULA: "YES"

pingdataconsole:
  enabled: true
  includeVolumes:
    - tools-config

  utilitySidecar:
    enabled: true
    command:
      - /bin/sh
      - -c
    args:
      - |
        echo "utility sidecar ready"
        tail -f /dev/null
    env:
      - name: LOG_LEVEL
        value: INFO
    envFrom:
      - configMapRef:
          name: pingdataconsole-sidecar-env

    # This field adds only sidecar volumeMounts. It does not create pod volumes.
    volumes:
      - name: tools-config
        mountPath: /opt/in/tools

volumes:
  tools-config:
    configMap:
      name: pingdataconsole-sidecar-tools
