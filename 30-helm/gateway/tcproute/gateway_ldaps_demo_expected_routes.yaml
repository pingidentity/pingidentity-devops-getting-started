apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-ldaps-demo-pingdirectory
spec:
  parentRefs:
  # The route attaches to the shared Gateway declared in the manifest file.
  - name: ping-devops-gateway
    namespace: ping-gateway
  hostnames:
  # Hostname comes from gateway.hosts[].host plus addReleaseNameToHost/defaultDomain.
  - gateway-ldaps-demo-pingdirectory.pingdemo.example
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    # backend.serviceName=https resolves to the main product Service on port 443.
    - name: gateway-ldaps-demo-pingdirectory
      port: 443
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-ldaps-demo-pingdataconsole
spec:
  parentRefs:
  - name: ping-devops-gateway
    namespace: ping-gateway
  hostnames:
  - gateway-ldaps-demo-pingdataconsole.pingdemo.example
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    # backend.serviceName=https resolves to the PingDataConsole Service on port 8443.
    - name: gateway-ldaps-demo-pingdataconsole
      port: 8443
---
apiVersion: gateway.networking.k8s.io/v1alpha2
kind: TCPRoute
metadata:
  name: gateway-ldaps-demo-pingdirectory-ldaps
spec:
  parentRefs:
  # TCPRoute reuses the same Gateway parentRef and injects the route-local sectionName.
  - name: ping-devops-gateway
    namespace: ping-gateway
    sectionName: ldaps-1636
  rules:
  - backendRefs:
    # backend.serviceName=ldaps resolves to the main PingDirectory Service on port 636.
    - name: gateway-ldaps-demo-pingdirectory
      port: 636
